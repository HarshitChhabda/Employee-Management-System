name: CI - Development

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build Vite app
        run: npm run build

      - name: Verify build output
        run: |
          if (Test-Path "dist/index.html") {
            echo "Build output verified: dist/index.html exists"
          } else {
            echo "Build failed: dist/index.html not found"
            exit 1
          }

      - name: Verify Electron files
        run: |
          if (Test-Path "electron/main.cjs") {
            echo "Electron main file verified"
          } else {
            echo "Electron main file not found"
            exit 1
          }

  test-electron-build:
    runs-on: windows-latest
    needs: lint-and-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package Electron app (no publish)
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify package output
        run: |
          if (Test-Path "release/*.exe") {
            echo "Electron package verified: installer created"
          } else {
            echo "Warning: No installer found in release/"
          }
